name: hamburguesa_facil
description: "¡Jamas habia sido tan divertido y facil hacer tu hamburguesa favorita!"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.3.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/breads/
    - assets/dressing/
    - assets/meats/
    - assets/toppings/