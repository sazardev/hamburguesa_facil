name: hamburguesa_facil
description: "¡Jamas habia sido tan divertido y facil hacer tu hamburguesa favorita! Elige tu pan, carne, topping y salsa favorita y crea la hamburguesa de tus sueños."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.2 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  get: ^4.6.6
  google_fonts: ^6.2.1
  shared_preferences: ^2.3.0
  smooth_page_indicator: ^1.1.0
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FF8FAB"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  web:
    generate: true
    image_path: "assets/icon/icon.png"
    background_color: "#FF8FAB"
    theme_color: "#FF8FAB"

flutter:
  uses-material-design: true

  assets:
    - assets/breads/
    - assets/dressing/
    - assets/meats/
    - assets/toppings/
    - assets/icon/